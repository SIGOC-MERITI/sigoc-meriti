<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatórios de Vistorias</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f5f5f5;
}

header {
    background: #0A2A66;
    color: white;
    padding: 15px;
    text-align: center;
}

.container {
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    text-align: left;
}

th {
    background: #0A2A66;
    color: white;
}
</style>
</head>

<body>

<header>
📊 SIGOC MERITI - Relatórios de Vistorias
</header>

<div class="container">
    <table id="tabela">
        <thead>
            <tr>
                <th>Data</th>
                <th>Tipo</th>
                <th>Risco</th>
                <th>Bairro</th>
                <th>Responsável</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
async function carregar() {
    const res = await fetch('http://localhost:3000/vistorias-lista');
    const dados = await res.json();

    const tbody = document.querySelector("tbody");
    tbody.innerHTML = "";

    dados.forEach(v => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${v.data}</td>
            <td>${v.tipo}</td>
            <td>${v.risco}</td>
            <td>${v.bairro}</td>
            <td>${v.responsavel}</td>
        `;
        tbody.appendChild(tr);
    });
}

carregar();
</script>

</body>
</html>
